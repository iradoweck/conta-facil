name: conta_facil
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.71.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Backend & Auth
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.2.10

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0
  image_picker: ^1.2.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
